<!-- survey.html (Smart Survey) -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindGuard | Smart Survey</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .emoji-btn.active {
            transform: scale(1.2);
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.5));
        }
        input[type=range] {
            -webkit-appearance: none; 
            background: transparent; 
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #38bdf8;
            cursor: pointer;
            margin-top: -8px; 
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #334155;
            border-radius: 2px;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col md:flex-row overflow-hidden">
    
    <!-- Sidebar -->
    <nav class="w-full md:w-64 bg-slate-900 border-r border-slate-800 flex flex-col z-20 shadow-xl">
        <div class="p-6 flex items-center gap-3 border-b border-slate-800">
            <div class="w-8 h-8 rounded bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center">
                <i class="fa-solid fa-brain text-white text-sm"></i>
            </div>
            <h1 class="text-xl font-bold tracking-tight text-white">MindGuard</h1>
        </div>

        <div class="flex-1 overflow-y-auto py-6 px-3 space-y-2">
            <a href="dashboard.html" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800 hover:text-white transition-all">
                <i class="fa-solid fa-grid-2"></i> Dashboard
            </a>
            <a href="predictive_trends.html" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800 hover:text-white transition-all">
                <i class="fa-solid fa-chart-line"></i> Predictive Trends
            </a>
            <a href="survey.html" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium bg-slate-800 text-blue-400 border border-slate-700">
                <i class="fa-solid fa-clipboard-list"></i> Smart Survey
            </a>
            <a href="action.html" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800 hover:text-white transition-all">
                <i class="fa-solid fa-list-check"></i> Action Plan
            </a>
            <a href="log.html" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800 hover:text-white transition-all">
                <i class="fa-solid fa-pills"></i> Therapy & Meds
            </a>
        </div>

        <div class="p-4 border-t border-slate-800">
            <div class="flex items-center gap-3">
                <img src="https://ui-avatars.com/api/?name=Alex+Doe&background=0D8ABC&color=fff" class="w-10 h-10 rounded-full border-2 border-slate-700">
                <div>
                    <p class="text-sm font-semibold text-white">Alex Doe</p>
                    <p class="text-xs text-slate-500">Patient ID: #MG-2024</p>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto bg-slate-950">
        <div class="p-6 md:p-8 max-w-3xl mx-auto">
            
            <div class="max-w-2xl mx-auto">
                <div class="mb-8 text-center">
                    <h2 class="text-3xl font-bold text-white mb-2">PHQ-9 Assessment</h2>
                    <p class="text-slate-400">Standardized clinical questionnaire for depression screening</p>
                </div>

                <div class="glass-panel rounded-2xl p-8">
                    <!-- Progress -->
                    <div class="mb-8">
                        <div class="flex justify-between text-sm text-slate-400 mb-2">
                            <span id="progress-text">Question 1 of 5</span>
                            <span id="progress-percent">0% Complete</span>
                        </div>
                        <div class="h-2 bg-slate-800 rounded-full overflow-hidden">
                            <div id="progress-bar" class="h-full bg-blue-500 transition-all duration-500" style="width: 0%"></div>
                        </div>
                    </div>

                    <!-- Question Container -->
                    <div id="question-container">
                        <!-- Questions injected by JS -->
                    </div>

                    <!-- Navigation -->
                    <div class="flex justify-between mt-8">
                        <button onclick="prevQuestion()" id="prev-btn" class="px-6 py-3 rounded
