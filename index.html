<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindGuard | AI-Powered Mental Health Command Center</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        'ai-green': '#10b981',
                        'ai-yellow': '#f59e0b',
                        'ai-red': '#ef4444',
                        'dark-bg': '#0f172a',
                        'card-bg': '#1e293b',
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'glow-green': 'glowGreen 2s ease-in-out infinite alternate',
                        'glow-yellow': 'glowYellow 2s ease-in-out infinite alternate',
                        'glow-red': 'glowRed 2s ease-in-out infinite alternate',
                    },
                    keyframes: {
                        glowGreen: {
                            '0%': { boxShadow: '0 0 5px #10b981, 0 0 10px #10b981' },
                            '100%': { boxShadow: '0 0 20px #10b981, 0 0 30px #10b981' },
                        },
                        glowYellow: {
                            '0%': { boxShadow: '0 0 5px #f59e0b, 0 0 10px #f59e0b' },
                            '100%': { boxShadow: '0 0 20px #f59e0b, 0 0 30px #f59e0b' },
                        },
                        glowRed: {
                            '0%': { boxShadow: '0 0 5px #ef4444, 0 0 10px #ef4444' },
                            '100%': { boxShadow: '0 0 20px #ef4444, 0 0 30px #ef4444' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #0f172a;
            color: #e2e8f0;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b; 
        }
        ::-webkit-scrollbar-thumb {
            background: #475569; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #64748b; 
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .status-orb {
            transition: all 0.5s ease;
        }

        .slide-in {
            animation: slideIn 0.4s ease-out forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .emoji-btn.active {
            transform: scale(1.2);
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.5));
        }

        /* Range Slider Styling */
        input[type=range] {
            -webkit-appearance: none; 
            background: transparent; 
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #38bdf8;
            cursor: pointer;
            margin-top: -8px; 
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #334155;
            border-radius: 2px;
        }
    </style>
</head>

            <div class="w-8 h-8 rounded bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center">
                <i class="fa-solid fa-brain text-white text-sm"></i>
            </div>
            <h1 class="text-xl font-bold tracking-tight text-white">MindGuard</h1>

                <i class="fa-solid fa-grid-2"></i> Dashboard
            </button>
            <button onclick="router('trends')" id="nav-trends" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800 hover:text-white transition-all">

            <button onclick="router('log')" id="nav-log" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800 hover:text-white transition-all">
