<!-- index.html (Login/Signup Page) -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindGuard | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-500/25">
                <i class="fa-solid fa-brain text-white text-2xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-white mb-2">MindGuard</h1>
            <p class="text-slate-400">AI-Powered Mental Health Command Center</p>
        </div>

        <!-- Login Form -->
        <div class="glass-panel rounded-2xl p-8">
            <h2 class="text-xl font-semibold text-white mb-6 text-center">Welcome Back</h2>
            
            <form onsubmit="handleLogin(event)" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-2">Email</label>
                    <div class="relative">
                        <i class="fa-solid fa-envelope absolute left-4 top-3.5 text-slate-500"></i>
                        <input type="email" required class="w-full bg-slate-900 border border-slate-700 rounded-xl py-3 pl-12 pr-4 text-white focus:outline-none focus:border-blue-500 transition" placeholder="alex@example.com">
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-2">Password</label>
                    <div class="relative">
                        <i class="fa-solid fa-lock absolute left-4 top-3.5 text-slate-500"></i>
                        <input type="password" required class="w-full bg-slate-900 border border-slate-700 rounded-xl py-3 pl-12 pr-4 text-white focus:outline-none focus:border-blue-500 transition" placeholder="••••••••">
                    </div>
                </div>

                <div class="flex items-center justify-between text-sm">
                    <label class="flex items-center gap-2 text-slate-400 cursor-pointer">
                        <input type="checkbox" class="rounded bg-slate-900 border-slate-700 text-blue-500">
                        Remember me
                    </label>
                    <a href="#" class="text-blue-400 hover:text-blue-300">Forgot password?</a>
                </div>

                <button type="submit" class="w-full py-3 bg-blue-500 hover:bg-blue-600 text-white font-semibold rounded-xl transition shadow-lg shadow-blue-500/25">
                    Sign In
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-slate-400 text-sm">
                    Don't have an account? 
                    <a href="#" onclick="toggleSignup()" class="text-blue-400 hover:text-blue-300 font-medium">Sign up</a>
                </p>
            </div>

            <!-- Divider -->
            <div class="relative my-6">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-slate-700"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-2 bg-slate-800 text-slate-500">Or continue with</span>
                </div>
            </div>

            <!-- Social Login -->
            <div class="grid grid-cols-2 gap-4">
                <button class="py-2.5 bg-slate-800 hover:bg-slate-700 rounded-xl text-slate-300 transition flex items-center justify-center gap-2">
                    <i class="fa-brands fa-google"></i> Google
                </button>
                <button class="py-2.5 bg-slate-800 hover:bg-slate-700 rounded-xl text-slate-300 transition flex items-center justify-center gap-2">
                    <i class="fa-brands fa-apple"></i> Apple
                </button>
            </div>
        </div>

        <!-- Privacy Note -->
        <p class="text-center text-xs text-slate-500 mt-6">
            <i class="fa-solid fa-shield-halved mr-1"></i>
            HIPAA Compliant • End-to-End Encrypted
        </p>
    </div>

    <script>
        function handleLogin(e) {
            e.preventDefault();
            // Simulate login
            window.location.href = 'dashboard.html';
        }
        
        function toggleSignup() {
            alert('Sign up form would appear here');
        }
    </script>
</body>
</html>
