<!DOCTYPE html>
<html>
<head>
<title>Health App - Sign Up</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f5f7fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:350px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#2563EB;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

p{
text-align:center;
font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<h2>Create Account</h2>

<form>

<label>Full Name</label>
<input type="text" placeholder="Enter your name">

<label>Email</label>
<input type="email" placeholder="Enter your email">

<label>Password</label>
<input type="password" placeholder="Create password">

<button type="button" onclick="nextPage()">Sign Up</button>

</form>

<p>Already have an account? Login</p>

</div>

<script>

function nextPage(){
window.location.href="medication.html";
}

</script>

</body>
</html>
